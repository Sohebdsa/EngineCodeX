name: Deploy Fullstack App on AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # ------------------------------
      # BACKEND SETUP
      # ------------------------------
      - name: Deploy backend code to EC2 path
        run: |
          mkdir -p /home/ubuntu/EngineCodeX/server
          # Copy server files but don't overwrite the workspace directory if it exists
          rsync -a --exclude 'workspace' ./server/ /home/ubuntu/EngineCodeX/server/
          
      - name: Install backend dependencies
        working-directory: /home/ubuntu/EngineCodeX/server
        run: npm install

      - name: Create backend .env file
        working-directory: /home/ubuntu/EngineCodeX/server
        run: |
          echo "${{ secrets.PROD_BACKEND_ENV }}" > .env

      - name: Start backend with PM2
        working-directory: /home/ubuntu/EngineCodeX/server
        run: |
          npx pm2 restart backend || npx pm2 start index.js --name backend

      # ------------------------------
      # FRONTEND SETUP
      # ------------------------------
      - name: Install frontend dependencies
        working-directory: ./client
        run: npm install

      - name: Create frontend .env file
        working-directory: ./client
        run: |
          touch .env
          echo "${{ secrets.PROD_FRONTEND_ENV }}" > .env

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      - name: Deploy frontend to Nginx
        run: |
          sudo rm -rf /var/www/html
          sudo mkdir -p /var/www/html
          sudo cp -r ./client/dist/* /var/www/html/
